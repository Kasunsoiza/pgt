<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="../assets/images/favicon.png">
<link rel="apple-touch-icon" href="../assets/images/favicon.png">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Download Your CV — Step 4 | europin.org</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5754968817099217" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>

    :root {
      --navy:#0d1b2a; --navy-mid:#162032; --navy-light:#1e2e42;
      --gold:#c9a84c; --gold-lt:#e2c47a; --cream:#f5f0e8;
      --muted:#8a9ab3; --border:rgba(201,168,76,0.15);
      --danger:#e05555; --success:#4caf6e;
      --radius:10px; --t:0.25s ease;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Jost',sans-serif;background:var(--navy);color:var(--cream);min-height:100vh;overflow-x:hidden}

    /* TOPBAR */
    .topbar{position:fixed;top:0;left:0;right:0;z-index:200;height:56px;background:rgba(13,27,42,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 2rem;gap:1.5rem}
    
    

    /* STEP PROGRESS */
    .progress-track{flex:1;display:flex;align-items:center;justify-content:center;gap:0}
    .prog-node{display:flex;align-items:center;gap:.45rem;padding:.3rem .75rem;border-radius:100px;font-size:.72rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);transition:all var(--t);white-space:nowrap}
    .prog-node .num{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;transition:all var(--t);flex-shrink:0}
    .prog-node.active{color:var(--gold)}.prog-node.active .num{background:var(--gold);color:var(--navy)}
    .prog-node.done{color:var(--success)}.prog-node.done .num{background:var(--success);color:#fff;font-size:.7rem}
    .prog-line{width:32px;height:1px;background:var(--border);flex-shrink:0;transition:background var(--t)}
    .prog-line.done{background:var(--success)}

    /* SCREENS */
    .screen{display:none;min-height:100vh;padding-top:56px}
    .screen.active{display:flex;flex-direction:column}
    #screen-preview.active{flex-direction:row}

    /* ── SCREEN 1: FORM ── */
    #screen-form{background:var(--navy)}
    .form-header{padding:3rem 2rem 1.5rem;text-align:center;background:linear-gradient(180deg,var(--navy-mid),var(--navy));border-bottom:1px solid var(--border)}
    .form-header h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.6rem,3vw,2.4rem);font-weight:700;color:var(--cream);margin-bottom:.4rem}
    .form-header p{color:var(--muted);font-size:.9rem}
    .form-body{max-width:900px;margin:0 auto;padding:2.5rem 2rem 6rem;width:100%}

    .form-section{background:var(--navy-mid);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1.5rem;overflow:hidden}
    .form-section-head{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;cursor:pointer;border-bottom:1px solid transparent;transition:border-color var(--t)}
    .form-section-head.open{border-bottom-color:var(--border)}
    .form-section-title{display:flex;align-items:center;gap:.6rem;font-size:.82rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cream)}
    .section-icon{color:var(--gold);font-size:1rem}
    .section-chevron{color:var(--muted);font-size:.75rem;transition:transform var(--t)}
    .section-chevron.open{transform:rotate(180deg)}
    .form-section-body{padding:1.5rem;display:none}
    .form-section-body.open{display:block}

    .fg{margin-bottom:1.2rem}
    .fg label{display:block;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
    .fg input,.fg textarea,.fg select{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.2);border-radius:6px;padding:.7rem .9rem;color:var(--cream);font-family:'Jost',sans-serif;font-size:.88rem;outline:none;transition:border-color var(--t)}
    .fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--gold)}
    .fg textarea{resize:vertical;min-height:80px;line-height:1.5}
    .fg select option{background:var(--navy-mid)}
    .fg input.error{border-color:var(--danger)}
    .fg .err-msg{font-size:.72rem;color:var(--danger);margin-top:.3rem;display:none}
    .fg input.error~.err-msg{display:block}

    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}

    .dyn-list{display:flex;flex-direction:column;gap:1rem;margin-bottom:1rem}
    .dyn-item{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:1.2rem;position:relative}
    .dyn-item-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
    .dyn-item-label{font-size:.78rem;font-weight:600;color:var(--gold)}
    .dyn-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;padding:.2rem .4rem;border-radius:4px;transition:all var(--t)}
    .dyn-remove:hover{color:var(--danger);background:rgba(224,85,85,.1)}
    .add-btn{width:100%;padding:.65rem;background:rgba(201,168,76,.06);border:1px dashed rgba(201,168,76,.3);border-radius:8px;color:var(--gold);font-family:'Jost',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all var(--t)}
    .add-btn:hover{background:rgba(201,168,76,.12);border-color:var(--gold)}

    .photo-zone{border:2px dashed rgba(201,168,76,.3);border-radius:var(--radius);padding:2rem 1.5rem;text-align:center;cursor:pointer;transition:all var(--t);position:relative;background:rgba(255,255,255,.02)}
    .photo-zone:hover{border-color:var(--gold);background:rgba(201,168,76,.04)}
    .photo-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border:none;background:none;padding:0}
    .photo-preview{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);margin:0 auto .75rem;display:none}
    .photo-zone-icon{font-size:2rem;margin-bottom:.5rem}
    .photo-zone-text{font-size:.8rem;color:var(--muted)}

    .skill-level-row{display:flex;align-items:center;gap:6px;margin-top:.5rem}
    .sdot{width:16px;height:16px;border-radius:50%;border:1.5px solid rgba(201,168,76,.35);cursor:pointer;transition:all var(--t);background:transparent;padding:0;flex-shrink:0}
    .sdot.on{background:var(--gold);border-color:var(--gold)}

    .val-banner{display:none;background:rgba(224,85,85,.12);border:1px solid var(--danger);border-radius:8px;padding:.9rem 1.25rem;color:#ff8080;font-size:.85rem;margin-bottom:1.5rem;align-items:center;gap:.75rem}
    .val-banner.show{display:flex}

    .form-cta{position:sticky;bottom:0;z-index:10;background:linear-gradient(0deg,var(--navy) 80%,transparent);padding:1.5rem 0 1rem;display:flex;justify-content:center;gap:1rem}
    .btn-primary{background:var(--gold);color:var(--navy);border:none;padding:.85rem 2.5rem;border-radius:8px;font-family:'Jost',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:all var(--t);display:flex;align-items:center;gap:.5rem}
    .btn-primary:hover{background:var(--gold-lt);transform:translateY(-1px);box-shadow:0 6px 24px rgba(201,168,76,.3)}

    /* ── SCREEN 2: PREVIEW + CUSTOMIZER ── */
    .customizer{width:290px;flex-shrink:0;background:var(--navy-mid);border-right:1px solid var(--border);overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1.5rem}
    .cust-title{font-size:.68rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:.75rem}

    .tmpl-cards{display:flex;flex-direction:column;gap:.6rem}
    .tmpl-card{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all var(--t)}
    .tmpl-card:hover{border-color:rgba(201,168,76,.4)}
    .tmpl-card.active{border-color:var(--gold);background:rgba(201,168,76,.08)}
    .tmpl-thumb{width:36px;height:48px;border-radius:3px;overflow:hidden;flex-shrink:0}
    .tt-berlin{background:linear-gradient(90deg,#1a1a2e 40%,#fff 40%)}
    .tt-paris{background:linear-gradient(180deg,#2c2c3a 30%,#fff 30%)}
    .tt-london{background:#fff;border:1px solid #ddd}
    .tmpl-info{flex:1}
    .tmpl-name{font-size:.82rem;font-weight:600;color:var(--cream)}
    .tmpl-desc{font-size:.68rem;color:var(--muted);margin-top:1px}
    .tmpl-check{color:var(--gold);font-size:.85rem;opacity:0;transition:opacity var(--t)}
    .tmpl-card.active .tmpl-check{opacity:1}

    .color-swatches{display:flex;flex-wrap:wrap;gap:.5rem}
    .cswatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all var(--t)}
    .cswatch:hover{transform:scale(1.15)}
    .cswatch.active{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.2)}

    .font-options{display:flex;flex-direction:column;gap:.5rem}
    .font-opt{padding:.6rem .9rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:.85rem;color:var(--muted);transition:all var(--t)}
    .font-opt:hover{border-color:rgba(201,168,76,.4);color:var(--cream)}
    .font-opt.active{border-color:var(--gold);color:var(--gold)}

    .toggle-row{display:flex;align-items:center;justify-content:space-between}
    .toggle-label{font-size:.82rem;color:var(--muted)}
    .toggle-switch{position:relative;width:40px;height:22px}
    .toggle-switch input{opacity:0;width:0;height:0;position:absolute}
    .toggle-track{position:absolute;inset:0;background:rgba(255,255,255,.1);border-radius:100px;cursor:pointer;transition:background var(--t)}
    .toggle-track::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:var(--muted);transition:all var(--t)}
    .toggle-switch input:checked+.toggle-track{background:var(--gold)}
    .toggle-switch input:checked+.toggle-track::after{transform:translateX(18px);background:var(--navy)}

    .cust-actions{display:flex;flex-direction:column;gap:.6rem;margin-top:auto}
    .btn-generate{background:var(--gold);color:var(--navy);border:none;padding:.7rem 1.5rem;border-radius:8px;font-family:'Jost',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:all var(--t);display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%}
    .btn-generate:hover{background:var(--gold-lt);transform:translateY(-1px)}
    .btn-back{background:transparent;color:var(--muted);border:1px solid var(--border);padding:.65rem 1rem;border-radius:8px;font-family:'Jost',sans-serif;font-size:.82rem;cursor:pointer;transition:all var(--t);display:flex;align-items:center;justify-content:center;gap:.4rem;width:100%}
    .btn-back:hover{color:var(--cream);border-color:rgba(255,255,255,.2)}

    .preview-pane{flex:1;background:#c2bebd;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;padding:2.5rem 1rem;position:relative;min-width:0}
    .preview-toolbar{display:flex;align-items:center;justify-content:space-between;width:100%;padding:0 2rem;margin-bottom:1.5rem;box-sizing:border-box}
    .preview-toolbar-left{font-size:.78rem;color:#777}
    .btn-gen-top{background:var(--gold);color:var(--navy);border:none;padding:.6rem 1.5rem;border-radius:8px;font-family:'Jost',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:all var(--t);display:flex;align-items:center;gap:.4rem}
    .btn-gen-top:hover{background:var(--gold-lt)}

    .cv-wrap{transform-origin:top left;transition:transform .15s ease;flex-shrink:0}

    /* ── SCREEN 3: GENERATING ── */
    #screen-generating{background:var(--navy);align-items:center;justify-content:center}
    .gen-card{background:var(--navy-mid);border:1px solid var(--border);border-radius:16px;padding:3rem 2.5rem;text-align:center;max-width:460px;width:90%}
    .gen-icon{font-size:3rem;margin-bottom:1.5rem;animation:spin 1.2s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .gen-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;margin-bottom:.5rem}
    .gen-sub{font-size:.88rem;color:var(--muted);margin-bottom:2rem}
    .gen-steps{display:flex;flex-direction:column;gap:.75rem;text-align:left}
    .gen-step{display:flex;align-items:center;gap:.75rem;font-size:.85rem;color:var(--muted);transition:color var(--t)}
    .gen-step.active{color:var(--cream)}
    .gen-step.done{color:var(--success)}
    .gen-step .si{font-size:1rem;width:24px;text-align:center;flex-shrink:0}
    .gen-prog{height:3px;background:rgba(255,255,255,.08);border-radius:100px;margin-top:2rem;overflow:hidden}
    .gen-prog-fill{height:100%;background:var(--gold);border-radius:100px;transition:width .4s ease;width:0%}

    /* ── SCREEN 4: DOWNLOAD ── */
    #screen-download{background:var(--navy);align-items:center;justify-content:center}
    .dl-card{background:var(--navy-mid);border:1px solid var(--border);border-radius:16px;padding:3rem 2.5rem;text-align:center;max-width:500px;width:90%}
    .dl-ring{width:80px;height:80px;border-radius:50%;background:rgba(76,175,110,.15);border:2px solid var(--success);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:2rem;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275)}
    @keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
    .dl-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;margin-bottom:.5rem}
    .dl-sub{font-size:.88rem;color:var(--muted);margin-bottom:2rem}
    .dl-actions{display:flex;flex-direction:column;gap:.75rem}
    .btn-dl{background:var(--gold);color:var(--navy);border:none;padding:1rem 2rem;border-radius:10px;font-family:'Jost',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all var(--t);display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%}
    .btn-dl:hover{background:var(--gold-lt);transform:translateY(-1px);box-shadow:0 8px 28px rgba(201,168,76,.3)}
    .btn-dl-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);padding:.75rem 2rem;border-radius:10px;font-family:'Jost',sans-serif;font-size:.88rem;cursor:pointer;transition:all var(--t);width:100%}
    .btn-dl-ghost:hover{color:var(--cream);border-color:rgba(255,255,255,.25)}
    .dl-note{font-size:.75rem;color:var(--muted);margin-top:1.25rem;line-height:1.7;background:rgba(255,255,255,.04);border-radius:8px;padding:.9rem 1rem;text-align:left}
    .dl-note strong{color:var(--cream)}

    /* ══ CV TEMPLATES ══ */
    /* BERLIN */
    .cv-berlin{width:210mm;min-height:297mm;display:grid;grid-template-columns:68mm 1fr;background:#fff;box-shadow:0 20px 70px rgba(0,0,0,.4);font-family:'Jost',sans-serif;font-size:10pt;color:#1a1a2e}
    .cv-berlin .csb{background:var(--ad,#1a1a2e);padding:10mm 7mm;display:flex;flex-direction:column;gap:6mm;color:#e8e4dd;align-self:stretch}
    .cv-berlin .pw{display:flex;justify-content:center;padding-top:3mm}
    .cv-berlin .cv-photo{width:36mm;height:36mm;border-radius:50%;object-fit:cover;border:none;display:block}
    .cv-berlin .pph{width:36mm;height:36mm;border-radius:50%;background:linear-gradient(145deg,#2d2d50,#3a3a6b);border:none;display:flex;align-items:center;justify-content:center}
    .cv-berlin .pph svg{width:18mm;height:18mm;opacity:.35}
    .cv-berlin .sbl{font-size:6pt;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--ac,#c9a84c);border-bottom:.5pt solid rgba(201,168,76,.3);padding-bottom:1.5mm;margin-bottom:2.5mm}
    .cv-berlin .ci{display:flex;align-items:flex-start;gap:2mm;font-size:7pt;line-height:1.45;color:#b8b4ae;margin-bottom:1.5mm}
    .cv-berlin .cic{color:var(--ac,#c9a84c);flex-shrink:0;margin-top:.5pt}
    .cv-berlin .skr{margin-bottom:2.5mm}
    .cv-berlin .skl{font-size:7pt;color:#b8b4ae;margin-bottom:1mm}
    .cv-berlin .skb{height:1.5mm;background:rgba(255,255,255,.1);border-radius:1mm;overflow:hidden}
    .cv-berlin .skf{height:100%;background:linear-gradient(90deg,var(--ac,#c9a84c),var(--acl,#e2c47a));border-radius:1mm}
    .cv-berlin .lr{display:flex;align-items:center;justify-content:space-between;margin-bottom:2mm}
    .cv-berlin .ln{font-size:7pt;color:#b8b4ae}
    .cv-berlin .ld{display:flex;gap:1mm}
    .cv-berlin .ldot{width:2.5mm;height:2.5mm;border-radius:50%;background:rgba(255,255,255,.15)}
    .cv-berlin .ldot.on{background:var(--ac,#c9a84c)}
    .cv-berlin .sbt{font-size:7pt;color:#b8b4ae;line-height:1.6}
    .cv-berlin .cmain{padding:10mm 9mm 10mm 8mm;display:flex;flex-direction:column;gap:5.5mm}
    .cv-berlin .nb{border-bottom:.5pt solid #e0dbd0;padding-bottom:5mm}
    .cv-berlin .cvn{font-size:26pt;font-weight:700;color:#1a1a2e;line-height:1;letter-spacing:-.02em}
    .cv-berlin .cvt{font-size:9pt;font-weight:300;color:#888;letter-spacing:.1em;text-transform:uppercase;margin-top:1.5mm}
    .cv-berlin .sh{display:flex;align-items:center;gap:2.5mm;margin-bottom:3mm}
    .cv-berlin .sd{width:3mm;height:3mm;background:var(--ac,#c9a84c);border-radius:50%;flex-shrink:0}
    .cv-berlin .st{font-size:7pt;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#1a1a2e}
    .cv-berlin .sr{flex:1;height:.5pt;background:#e0dbd0}
    .cv-berlin .pt{font-size:8pt;color:#444;line-height:1.75}
    .cv-berlin .ee{display:grid;grid-template-columns:22mm 1fr;gap:3mm;margin-bottom:4mm}
    .cv-berlin .ed{font-size:7pt;color:#888;line-height:1.5}
    .cv-berlin .et{font-size:9.5pt;font-weight:700;color:#1a1a2e}
    .cv-berlin .eo{font-size:8pt;color:var(--ac,#c9a84c);margin-bottom:1.5mm}
    .cv-berlin .el{padding-left:3.5mm;list-style:disc}
    .cv-berlin .el li{font-size:7.5pt;color:#444;line-height:1.65;margin-bottom:.5mm}
    .cv-berlin .edue{display:grid;grid-template-columns:22mm 1fr;gap:3mm;margin-bottom:3mm}
    .cv-berlin .edud{font-size:7pt;color:#888}
    .cv-berlin .edd{font-size:9pt;font-weight:700;color:#1a1a2e}
    .cv-berlin .eds{font-size:8pt;color:var(--ac,#c9a84c)}
    .cv-berlin .edn{font-size:7pt;color:#777;margin-top:.5mm}
    .cv-berlin .cg{display:grid;grid-template-columns:1fr 1fr;gap:1.5mm 4mm}
    .cv-berlin .cgi{font-size:7.5pt;color:#555}
    .cv-berlin .cgy{color:#aaa}

    /* PARIS */
    .cv-paris{width:210mm;min-height:297mm;background:#fff;box-shadow:0 20px 70px rgba(0,0,0,.4);font-family:'Jost',sans-serif;font-size:10pt;color:#2c2c3a}
    .cv-paris .ph{background:var(--ad,#2c2c3a);padding:10mm 12mm 8mm;display:flex;align-items:center;gap:8mm}
    .cv-paris .cv-photo{width:28mm;height:28mm;border-radius:50%;object-fit:cover;border:none;flex-shrink:0}
    .cv-paris .pph{width:28mm;height:28mm;border-radius:50%;background:rgba(255,255,255,.1);border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .cv-paris .pph svg{width:14mm;height:14mm;opacity:.3}
    .cv-paris .cvn{font-size:24pt;font-weight:700;color:#fff;line-height:1;letter-spacing:-.02em}
    .cv-paris .cvt{font-size:9pt;color:var(--ac,#d4a843);letter-spacing:.12em;text-transform:uppercase;margin-top:1.5mm}
    .cv-paris .pcs{display:flex;flex-wrap:wrap;gap:1.5mm 5mm;margin-top:2.5mm}
    .cv-paris .pcs span{font-size:7pt;color:rgba(255,255,255,.6)}
    .cv-paris .pb{display:grid;grid-template-columns:1fr 58mm}
    .cv-paris .pm{padding:8mm 8mm 8mm 12mm}
    .cv-paris .pa{padding:8mm 8mm 8mm 6mm;background:#f8f5f0;border-left:1px solid #e8e3da;align-self:stretch}

/* ═══════════════════════════════════════════════════
   PRINT / PAGE BREAK RULES
═══════════════════════════════════════════════════ */
@media print {
  .cv-berlin,.cv-paris,.cv-london,.cv-ats{
    box-shadow:none!important;
    -webkit-print-color-adjust:exact!important;
    print-color-adjust:exact!important;
  }
  .cv-berlin{min-height:0!important;height:auto!important;}
  .cv-berlin .csb{min-height:100vh;}
  .cv-berlin .ee,.cv-berlin .edue,
  .cv-paris .xe,.cv-paris .edue,
  .cv-london .xe,.cv-london .edue,
  .cv-ats .aee,.cv-ats .aedu{
    break-inside:avoid;page-break-inside:avoid;
  }
  .cv-berlin .sh,.cv-paris .st,.cv-london .st,.cv-ats .ast{
    break-after:avoid;page-break-after:avoid;
  }
  .cv-berlin section,.cv-paris section,.cv-london section,.cv-ats section{
    break-inside:avoid;page-break-inside:avoid;
  }
}

    /* PHOTO CROP MODAL */
    .crop-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center}
    .crop-overlay.open{display:flex}
    .crop-box{background:var(--navy-mid);border:1px solid var(--border);border-radius:16px;padding:1.5rem;width:min(420px,95vw);display:flex;flex-direction:column;gap:1rem}
    .crop-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;text-align:center}
    .crop-canvas-wrap{position:relative;width:260px;height:260px;margin:0 auto;overflow:hidden;border-radius:50%;border:2.5px solid var(--gold);cursor:grab;user-select:none;background:#111}
    .crop-canvas-wrap:active{cursor:grabbing}
    #cropCanvas{position:absolute;top:0;left:0;touch-action:none}
    .crop-controls{display:flex;flex-direction:column;gap:.6rem}

    .crop-slider-row input[type=range]{flex:1;accent-color:var(--gold)}
    .crop-actions{display:flex;gap:.6rem}
    .crop-btn{flex:1;padding:.7rem;border-radius:8px;border:none;font-family:'Jost',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer}
    .crop-btn-confirm{background:var(--gold);color:var(--navy)}
    .crop-btn-cancel{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border)!important}

    /* Overlays — always hidden until .open, regardless of screen size */
    .mob-cv-overlay,.mob-gen-overlay{display:none}
    .mob-cv-overlay.open,.mob-gen-overlay.open{display:flex}

    /* ══════════════════════════════════
       MOBILE LAYOUT (≤768px)
       Completely separate UX:
       - Bottom tab bar navigation
       - Single-section scrolling cards
       - Full-screen CV preview toggle
       - Large tap targets throughout
    ══════════════════════════════════ */
    @media(max-width:768px){

      /* Hide desktop-only elements */
      .progress-track{display:none}
      #screen-form,#screen-preview,#screen-generating,#screen-download{display:none!important}

      /* Mobile shell — always visible */
      .mob-shell{display:flex;flex-direction:column;height:100vh;height:100dvh;background:var(--navy);overflow:hidden}

      /* Mobile top bar */
      .mob-topbar{height:52px;background:var(--navy-mid);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1rem;flex-shrink:0;position:relative;z-index:50}
      .mob-logo{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.05rem;color:var(--cream);text-decoration:none}
      .mob-logo span{color:var(--gold)}
      .mob-preview-btn{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);color:var(--gold);padding:.4rem .85rem;border-radius:20px;font-family:'Jost',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.05em;cursor:pointer;display:flex;align-items:center;gap:.35rem;transition:all var(--t)}
      .mob-preview-btn:active{background:rgba(201,168,76,.2)}

      /* Mobile content area */
      .mob-content{flex:1;overflow:hidden;position:relative}

      /* Mobile tab panels */
      .mob-panel{position:absolute;inset:0;overflow-y:auto;padding:1rem 1rem 5rem;display:none;-webkit-overflow-scrolling:touch}
      .mob-panel.active{display:block}

      /* Section heading inside panel */
      .mob-sec-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--cream);margin-bottom:.25rem}
      .mob-sec-sub{font-size:.78rem;color:var(--muted);margin-bottom:1.5rem}

      /* Card wrapper */
      .mob-card{background:var(--navy-mid);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem}

      /* Larger inputs for touch */
      .mob-panel .fg input,.mob-panel .fg textarea,.mob-panel .fg select{padding:.85rem 1rem;font-size:1rem;border-radius:8px;-webkit-appearance:none}
      .mob-panel .fg label{font-size:.7rem;margin-bottom:.5rem}
      .mob-panel .form-row,.mob-panel .form-row-3{grid-template-columns:1fr;gap:.75rem}

      /* Mobile photo upload */
      .mob-photo-zone{border:2px dashed rgba(201,168,76,.3);border-radius:12px;padding:1.5rem;text-align:center;cursor:pointer;position:relative;background:rgba(255,255,255,.02);margin-bottom:1rem}
      .mob-photo-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border:none;background:none;padding:0}
      .mob-photo-thumb{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);margin:0 auto .5rem;display:none}
      .mob-photo-icon{font-size:2.2rem;margin-bottom:.4rem}
      .mob-photo-text{font-size:.82rem;color:var(--muted)}

      /* Dynamic items on mobile */
      .mob-dyn-item{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:1.1rem;margin-bottom:.75rem}
      .mob-dyn-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
      .mob-dyn-label{font-size:.8rem;font-weight:700;color:var(--gold)}
      .mob-dyn-remove{background:rgba(224,85,85,.1);border:1px solid rgba(224,85,85,.2);color:#ff8080;padding:.3rem .65rem;border-radius:6px;font-size:.72rem;font-weight:600;cursor:pointer}

      .mob-add-btn{width:100%;padding:.85rem;background:rgba(201,168,76,.07);border:1.5px dashed rgba(201,168,76,.35);border-radius:10px;color:var(--gold);font-family:'Jost',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.4rem;margin-top:.5rem;-webkit-tap-highlight-color:transparent}

      /* Skill dots — larger on mobile */
      .mob-sdots{display:flex;gap:8px;margin-top:.6rem}
      .mob-sdot{width:24px;height:24px;border-radius:50%;border:2px solid rgba(201,168,76,.35);cursor:pointer;background:transparent;padding:0;flex-shrink:0;transition:all var(--t);-webkit-tap-highlight-color:transparent}
      .mob-sdot.on{background:var(--gold);border-color:var(--gold)}

      /* Customise panel swatches */
      .mob-swatches{display:flex;flex-wrap:wrap;gap:.6rem;margin-top:.5rem}
      .mob-swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all var(--t);-webkit-tap-highlight-color:transparent}
      .mob-swatch.active{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.25)}

      .mob-font-row{display:flex;flex-direction:column;gap:.5rem;margin-top:.5rem}
      .mob-font-opt{padding:.75rem 1rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:.88rem;color:var(--muted);transition:all var(--t)}
      .mob-font-opt.active{border-color:var(--gold);color:var(--gold)}

      .mob-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0}
      .mob-toggle-label{font-size:.88rem;color:var(--muted)}

      /* Bottom tab bar */
      .mob-tabbar{height:64px;height:calc(64px + env(safe-area-inset-bottom));background:var(--navy-mid);border-top:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-around;padding-top:8px;padding-bottom:env(safe-area-inset-bottom);flex-shrink:0;z-index:50}
      .mob-tab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:.3rem .5rem;border:none;background:none;cursor:pointer;color:var(--muted);transition:color var(--t);flex:1;-webkit-tap-highlight-color:transparent;min-width:0}
      .mob-tab-icon{font-size:1.3rem;line-height:1}
      .mob-tab-label{font-size:.6rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
      .mob-tab.active{color:var(--gold)}
      .mob-tab-badge{position:relative}
      .mob-tab-badge::after{content:'';position:absolute;top:-2px;right:-4px;width:6px;height:6px;border-radius:50%;background:var(--gold)}

      /* Download tab CTA */
      .mob-dl-tab{background:var(--gold)!important;border-radius:12px;color:var(--navy)!important;padding:.4rem .8rem!important}
      .mob-dl-tab .mob-tab-label{color:var(--navy)!important}

      /* Full-screen CV preview overlay */
      .mob-cv-overlay{position:fixed;inset:0;z-index:300;background:#b8b4b2;display:none;flex-direction:column}
      .mob-cv-overlay.open{display:flex}
      .mob-cv-overlay-bar{height:52px;background:var(--navy-mid);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1rem;flex-shrink:0}
      .mob-cv-overlay-title{font-size:.85rem;font-weight:600;color:var(--cream)}
      .mob-cv-close{background:rgba(255,255,255,.08);border:none;color:var(--cream);padding:.4rem .9rem;border-radius:20px;font-family:'Jost',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer}
      .mob-cv-scroll{flex:1;overflow-y:auto;display:flex;justify-content:center;padding:1.5rem 1rem;-webkit-overflow-scrolling:touch}
      .mob-cv-wrap{transform-origin:top center}
      .mob-cv-dl-bar{padding:.75rem 1rem calc(.75rem + env(safe-area-inset-bottom));background:var(--navy-mid);border-top:1px solid var(--border);flex-shrink:0}
      .mob-cv-dl-btn{width:100%;padding:1rem;background:var(--gold);color:var(--navy);border:none;border-radius:10px;font-family:'Jost',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;-webkit-tap-highlight-color:transparent}

      /* Generating overlay */
      .mob-gen-overlay{position:fixed;inset:0;z-index:400;background:var(--navy);display:none;flex-direction:column;align-items:center;justify-content:center}
      .mob-gen-overlay.open{display:flex}

      /* Validation banner */
      .mob-val-banner{background:rgba(224,85,85,.12);border:1px solid var(--danger);border-radius:8px;padding:.85rem 1rem;color:#ff8080;font-size:.82rem;margin-bottom:1rem;display:none;align-items:center;gap:.6rem}
      .mob-val-banner.show{display:flex}

      /* Template cards — full width with mini preview */
      .mob-tmpl-card{display:flex;align-items:center;gap:.9rem;background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:12px;padding:.85rem;margin-bottom:.65rem;cursor:pointer;transition:all var(--t);-webkit-tap-highlight-color:transparent}
      .mob-tmpl-card:active{transform:scale(.98)}
      .mob-tmpl-card.active{border-color:var(--gold);background:rgba(201,168,76,.08)}
      .mob-tmpl-preview{width:72px;height:52px;border-radius:6px;overflow:hidden;flex-shrink:0;border:1px solid rgba(0,0,0,.15)}
      .mob-tmpl-info{flex:1;min-width:0}
      .mob-tmpl-name{font-size:.88rem;font-weight:700;color:var(--cream);display:flex;align-items:center;gap:.4rem}
      .mob-tmpl-badge{font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:var(--gold);color:var(--navy);padding:.1rem .35rem;border-radius:100px}
      .mob-tmpl-desc{font-size:.72rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .mob-tmpl-tick{color:var(--gold);font-size:1.1rem;opacity:0;transition:opacity var(--t);flex-shrink:0}
      .mob-tmpl-card.active .mob-tmpl-tick{opacity:1}

      /* Generate button */
      .mob-generate-btn{width:100%;margin-top:1rem;padding:1.05rem;background:var(--gold);color:var(--navy);border:none;border-radius:12px;font-family:'Jost',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;-webkit-tap-highlight-color:transparent;transition:all var(--t)}
      .mob-generate-btn:active{transform:scale(.97);background:var(--gold-lt)}
    }

    /* Hide mobile shell on desktop */
    @media(min-width:769px){
      .mob-shell{display:none!important}
    }
  

/* ── AD SLOTS ────────────────────────────────────────────────── */
.ad-top {
  width: 100%;
  background: var(--navy-mid);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: center;
  padding: .4rem 1rem;

}
.ad-bottom {
  width: 100%;
  background: var(--navy-mid);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: center;
  padding: .4rem 1rem;
  min-height: 60px;
}
.ad-side {
  width: 160px;
  flex-shrink: 0;
  min-height: 250px;
  display: flex;
  align-items: flex-start;

  padding-top: 1rem;

/* Hide side ads on smaller screens to not crush content */
@media (max-width: 1100px) { .ad-side { display: none; } }

@media (max-width: 768px) {
  .ad-top, .ad-bottom { min-height: 50px; padding: .3rem; }

}

.page-main {

<script>
/* ═══════════════════════════════════════════════
   SECURITY
═══════════════════════════════════════════════ */
function x(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function xs(s){return x(s)}

/* ═══════════════════════════════════════════════
   STATE — sessionStorage (clears when tab closes)
═══════════════════════════════════════════════ */
const S_DEFAULT={
  photo:null,name:'',title:'',summary:'',
  email:'',phone:'',location:'',linkedin:'',website:'',interests:'',
  template:'berlin',accent:'#c9a84c',accentLt:'#e2c47a',accentDark:'#1a1a2e',
  headingFont:'Cormorant Garamond',showPhoto:true,
  experience:[],education:[],skills:[],languages:[],certificates:[]
};
let S=Object.assign({},S_DEFAULT);
let _photo=null; // photo kept in memory only, never serialised

function saveState(){
  try{
    const d=Object.assign({},S);
    d.photo=null;
    sessionStorage.setItem('_cv',JSON.stringify(d));
  }catch(e){}
}
function loadState(){
  try{
    const raw=sessionStorage.getItem('_cv');
    if(raw){S=Object.assign({},S_DEFAULT,JSON.parse(raw));}
    if(!_photo){try{_photo=sessionStorage.getItem('_cv_photo')||null;}catch(e){}}
    S.photo=_photo;
  }catch(e){}
}

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
function bul(desc,cls){
  if(!desc||!desc.trim())return'';
  return'<ul class="'+cls+'">'+desc.trim().split('\n').filter(l=>l.trim()).map(l=>'<li>'+x(l.replace(/^[-•·]\s*/,''))+'</li>').join('')+'</ul>';
}
function pTag(pCls,phCls){
  if(S.photo&&S.showPhoto)return'<img class="'+pCls+'" src="'+S.photo+'" alt="">';
  if(!S.showPhoto)return'';
  return'<div class="'+phCls+'"><svg viewBox="0 0 100 100" fill="none"><circle cx="50" cy="38" r="22" fill="#c9a84c" opacity="0.4"/><ellipse cx="50" cy="90" rx="38" ry="28" fill="#c9a84c" opacity="0.35"/></svg></div>';
}
function ldots(lvl){
  const m={A1:1,A2:1,B1:2,B2:3,C1:4,C2:5,Native:5};
  return Array.from({length:5},(_,i)=>'<div class="ldot '+(i<(m[lvl]||3)?'on':'')+'"></div>').join('');
}
function isMob(){return window.innerWidth<=768;}

/* ═══════════════════════════════════════════════
   CV RENDERERS
═══════════════════════════════════════════════ */
function rBerlin(){
  const ac=S.accent,acl=S.accentLt,acd=S.accentDark;
  return'<div class="cv-berlin" style="--ac:'+ac+';--acl:'+acl+';--ad:'+acd+'"><aside class="csb"><div class="pw">'+pTag('cv-photo','pph')+'</div>'
    +(S.email||S.phone||S.location||S.linkedin?'<div><div class="sbl">Contact</div>'+(S.email?'<div class="ci"><span class="cic">✉</span><span>'+x(S.email)+'</span></div>':'')+(S.phone?'<div class="ci"><span class="cic">✆</span><span>'+x(S.phone)+'</span></div>':'')+(S.location?'<div class="ci"><span class="cic">⌂</span><span>'+x(S.location)+'</span></div>':'')+(S.linkedin?'<div class="ci"><span class="cic">in</span><span>'+x(S.linkedin)+'</span></div>':'')+'</div>':'')
    +(S.skills.length?'<div><div class="sbl">Skills</div>'+S.skills.map(s=>'<div class="skr"><div class="skl">'+x(s.name)+'</div><div class="skb"><div class="skf" style="width:'+s.level+'%"></div></div></div>').join('')+'</div>':'')
    +(S.languages.length?'<div><div class="sbl">Languages</div>'+S.languages.map(l=>'<div class="lr"><span class="ln">'+x(l.name)+'</span><div class="ld">'+ldots(l.level)+'</div></div>').join('')+'</div>':'')
    +(S.interests?'<div><div class="sbl">Interests</div><p class="sbt">'+x(S.interests)+'</p></div>':'')
    +'</aside><main class="cmain"><div class="nb"><div class="cvn" style="font-family:\''+S.headingFont+'\',serif,sans-serif">'+x(S.name||'Your Name')+'</div><div class="cvt">'+x(S.title||'Professional Title')+'</div></div>'
    +(S.summary?'<section><div class="sh"><div class="sd"></div><div class="st">Profile</div><div class="sr"></div></div><p class="pt">'+x(S.summary)+'</p></section>':'')
    +(S.experience.length?'<section><div class="sh"><div class="sd"></div><div class="st">Experience</div><div class="sr"></div></div>'+S.experience.map(e=>'<div class="ee"><div class="ed">'+x(e.from)+(e.to?'<br>– '+x(e.to):'')+'</div><div><div class="et">'+x(e.title)+'</div>'+(e.org?'<div class="eo">'+x(e.org)+'</div>':'')+bul(e.desc,'el')+'</div></div>').join('')+'</section>':'')
    +(S.education.length?'<section><div class="sh"><div class="sd"></div><div class="st">Education</div><div class="sr"></div></div>'+S.education.map(e=>'<div class="edue"><div class="edud">'+x(e.from)+(e.to?'–'+x(e.to):'')+'</div><div><div class="edd">'+x(e.degree)+'</div>'+(e.school?'<div class="eds">'+x(e.school)+'</div>':'')+(e.note?'<div class="edn">'+x(e.note)+'</div>':'')+'</div></div>').join('')+'</section>':'')
    +(S.certificates.length?'<section><div class="sh"><div class="sd"></div><div class="st">Certificates</div><div class="sr"></div></div><div class="cg">'+S.certificates.map(c=>'<div class="cgi">'+x(c.name)+(c.year?' <span class="cgy">· '+x(c.year)+'</span>':'')+'</div>').join('')+'</div></section>':'')
    +'</main></div>';
}
function rParis(){
  const ac=S.accent,acd=S.accentDark;
  return'<div class="cv-paris" style="--ac:'+ac+';--ad:'+acd+'"><div class="ph">'+pTag('cv-photo','pph')+'<div><div class="cvn" style="font-family:\''+S.headingFont+'\',serif,sans-serif">'+x(S.name||'Your Name')+'</div><div class="cvt">'+x(S.title||'Professional Title')+'</div><div class="pcs">'+(S.email?'<span>✉ '+x(S.email)+'</span>':'')+(S.phone?'<span>✆ '+x(S.phone)+'</span>':'')+(S.location?'<span>⌂ '+x(S.location)+'</span>':'')+'</div></div></div>'
    +'<div class="pb"><div class="pm">'
    +(S.summary?'<p class="pt">'+x(S.summary)+'</p>':'')
    +(S.experience.length?'<div class="st">Experience</div>'+S.experience.map(e=>'<div class="xe"><div class="xeh"><span class="xt">'+x(e.title)+'</span><span class="xd">'+x(e.from)+(e.to?' – '+x(e.to):'')+'</span></div>'+(e.org?'<div class="xo">'+x(e.org)+'</div>':'')+bul(e.desc,'xl')+'</div>').join(''):'')
    +(S.education.length?'<div class="st" style="margin-top:4mm">Education</div>'+S.education.map(e=>'<div class="edue"><div class="edd">'+x(e.degree)+'</div>'+(e.school?'<div class="eds">'+x(e.school)+'</div>':'')+(e.note?'<div class="edn">'+x(e.note)+'</div>':'')+'</div>').join(''):'')
    +'</div><div class="pa">'
    +(S.skills.length?'<div class="as"><div class="al">Skills</div>'+S.skills.map(s=>'<div class="skr"><div class="skl">'+x(s.name)+'</div><div class="skb"><div class="skf" style="width:'+s.level+'%"></div></div></div>').join('')+'</div>':'')
    +(S.languages.length?'<div class="as"><div class="al">Languages</div>'+S.languages.map(l=>'<div class="lr"><span class="ln">'+x(l.name)+'</span><span class="ll">'+x(l.level)+'</span></div>').join('')+'</div>':'')
    +(S.certificates.length?'<div class="as"><div class="al">Certificates</div>'+S.certificates.map(c=>'<div style="font-size:7pt;color:#555;margin-bottom:1.5mm">'+x(c.name)+(c.year?' <span style="color:#aaa">· '+x(c.year)+'</span>':'')+'</div>').join('')+'</div>':'')
    +(S.interests?'<div class="as"><div class="al">Interests</div><div style="font-size:7pt;color:#555;line-height:1.6">'+x(S.interests)+'</div></div>':'')
    +'</div></div></div>';
}
function rLondon(){
  const acd=S.accentDark;
  return'<div class="cv-london" style="--ad:'+acd+'"><div class="lh">'+pTag('cv-photo','pph')+'<div><div class="cvn" style="font-family:\''+S.headingFont+'\',serif,sans-serif">'+x(S.name||'Your Name')+'</div><div class="cvt">'+x(S.title||'Professional Title')+'</div><div class="lcs">'+(S.email?'<span class="lci">✉ '+x(S.email)+'</span>':'')+(S.phone?'<span class="lci">✆ '+x(S.phone)+'</span>':'')+(S.location?'<span class="lci">⌂ '+x(S.location)+'</span>':'')+'</div></div></div>'
    +'<div class="lb"><div>'
    +(S.summary?'<div class="st">Profile</div><p class="pt">'+x(S.summary)+'</p>':'')
    +(S.experience.length?'<div class="st">Experience</div>'+S.experience.map(e=>'<div class="xe"><div class="xeh"><span class="xt">'+x(e.title)+'</span><span class="xd">'+x(e.from)+(e.to?' – '+x(e.to):'')+'</span></div>'+(e.org?'<div class="xo">'+x(e.org)+'</div>':'')+bul(e.desc,'xl')+'</div>').join(''):'')
    +(S.education.length?'<div class="st" style="margin-top:4mm">Education</div>'+S.education.map(e=>'<div class="edue"><div class="edd">'+x(e.degree)+'</div>'+(e.school?'<div class="eds">'+x(e.school)+'</div>':'')+(e.note?'<div class="edn">'+x(e.note)+'</div>':'')+'</div>').join(''):'')
    +'</div><div>'
    +(S.skills.length?'<div class="as"><div class="al">Skills</div>'+S.skills.map(s=>'<div class="skr"><div class="skl">'+x(s.name)+'</div><div class="skb"><div class="skf" style="width:'+s.level+'%"></div></div></div>').join('')+'</div>':'')
    +(S.languages.length?'<div class="as"><div class="al">Languages</div>'+S.languages.map(l=>'<div class="lr"><span class="ln">'+x(l.name)+'</span><span class="ll">'+x(l.level)+'</span></div>').join('')+'</div>':'')
    +(S.certificates.length?'<div class="as"><div class="al">Certifications</div>'+S.certificates.map(c=>'<div style="font-size:7pt;color:#555;margin-bottom:1.5mm">'+x(c.name)+(c.year?' <span style="color:#aaa">· '+x(c.year)+'</span>':'')+'</div>').join('')+'</div>':'')
    +(S.interests?'<div class="as"><div class="al">Interests</div><div style="font-size:7pt;color:#555;line-height:1.6">'+x(S.interests)+'</div></div>':'')
    +'</div></div></div>';
}
function rAts(){
  let o='<div class="cv-ats">';
  o+='<div class="ah"><div class="cvn">'+x(S.name||'Your Name')+'</div>';
  o+='<div class="cvt">'+x(S.title||'Professional Title')+'</div>';
  o+='<div class="acs">';
  if(S.email)o+='<span class="aci">'+x(S.email)+'</span>';
  if(S.phone)o+='<span class="aci">'+x(S.phone)+'</span>';
  if(S.location)o+='<span class="aci">'+x(S.location)+'</span>';
  if(S.linkedin)o+='<span class="aci">'+x(S.linkedin)+'</span>';
  o+='</div></div>';
  if(S.summary)o+='<div class="ast">Professional Summary</div><p class="apt">'+x(S.summary)+'</p>';
  if(S.experience.length){
    o+='<div class="ast">Work Experience</div>';
    S.experience.forEach(e=>{
      o+='<div class="aee"><div class="aeh"><span class="aet">'+x(e.title)+'</span><span class="aed">'+x(e.from)+(e.to?' - '+x(e.to):'')+'</span></div>';
      if(e.org)o+='<div class="aeo">'+x(e.org)+'</div>';
      o+=bul(e.desc,'ael')+'</div>';
    });
  }
  if(S.education.length){
    o+='<div class="ast">Education</div>';
    S.education.forEach(e=>{
      o+='<div class="aedu"><div class="aeh"><span class="add">'+x(e.degree)+'</span><span class="aed">'+x(e.from)+(e.to?' - '+x(e.to):'')+'</span></div>';
      if(e.school)o+='<div class="ads">'+x(e.school)+'</div>';
      if(e.note)o+='<div class="adn">'+x(e.note)+'</div>';
      o+='</div>';
    });
  }
  if(S.skills.length){
    o+='<div class="ast">Skills</div><div class="acg">';
    S.skills.forEach(s=>{o+='<div class="acgi">'+x(s.name)+'</div>';});
    o+='</div>';
  }
  if(S.languages.length){
    o+='<div class="ast">Languages</div>';
    S.languages.forEach(l=>{o+='<div class="lr"><span class="ln">'+x(l.name)+'</span><span class="ll">'+x(l.level)+'</span></div>';});
  }
  if(S.certificates.length){
    o+='<div class="ast">Certifications</div><div class="acg">';
    S.certificates.forEach(c=>{o+='<div class="acgi">'+x(c.name)+(c.year?' <span class="acgy">'+x(c.year)+'</span>':'')+'</div>';});
    o+='</div>';
  }
  if(S.interests)o+='<div class="ast">Interests</div><p class="apt">'+x(S.interests)+'</p>';
  o+='</div>';return o;
}
function renderCV(id){
  const w=document.getElementById(id||'cvWrap');if(!w)return;
  w.innerHTML=S.template==='berlin'?rBerlin():S.template==='paris'?rParis():S.template==='ats'?rAts():rLondon();
}
function scaleCV(wrapId,paneId){
  const w=document.getElementById(wrapId||'cvWrap');
  const p=document.getElementById(paneId||'previewPane');
  if(!p||!w||!w.firstElementChild)return;

}

/* ── PDF Server URL — auto-detects local vs production ── */
var PDF_SERVER = (function(){
  var h = window.location.hostname;
  var proto = window.location.protocol;
  /* file://, localhost, 127.0.0.1, or any local IP → use local server */
  if(proto === 'file:' || h === 'localhost' || h === '127.0.0.1' || /^192\.168\.|^10\.|^172\./.test(h)){
    return 'http://localhost:3001';
  }
  /* Production — update this to your Render.com URL */
  return 'https://europin-pdf-server.onrender.com';
})();

function getFileName(){return(S.name||'CV').trim().replace(/\s+/g,'_')+'_CV_europin.pdf';}

/* ── Main download function — tries Puppeteer server first, then falls back ── */
async function downloadCV(btn){
  if(btn){
    btn.disabled=true;
    btn._h=btn.innerHTML;
    btn.innerHTML='<svg style="animation:spin 1s linear infinite;display:inline-block;vertical-align:middle;margin-right:.4rem" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>Generating PDF…';
  }
  var restore=function(){if(btn){btn.disabled=false;btn.innerHTML=btn._h||'Download PDF';}};

  try{
    var html=buildPrintHTML();
    var fname=getFileName();

    /* ── Try Puppeteer server (real Chrome, Europass quality) ── */
    var resp;
    try{
      resp=await fetch(PDF_SERVER+'/generate-pdf',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({html:html,filename:fname.replace('.pdf','')}),
        signal:AbortSignal.timeout(30000)
      });
    }catch(fetchErr){
      console.warn('PDF server unreachable, falling back to html2canvas:',fetchErr.message);
      resp=null;
    }

    if(resp&&resp.ok){
      /* ── Server responded — download the PDF directly ── */
      var blob=await resp.blob();
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url;a.download=fname;
      document.body.appendChild(a);a.click();
      document.body.removeChild(a);
      setTimeout(function(){URL.revokeObjectURL(url);},5000);
      restore();

    }else{
      /* ── Fallback: html2canvas + jsPDF (client-side) ── */
      console.warn('PDF server error or unavailable, using html2canvas fallback');
      await downloadCV_fallback(btn,fname,restore);
    }

  }catch(err){
    console.error('downloadCV error:',err);
    restore();
    alert('PDF generation failed.\n'+err.message);
  }
}

/* ── Fallback: html2canvas + jsPDF ── */
async function downloadCV_fallback(btn,fname,restore){
  try{
    var A4_W=794,A4_H=1123,SCALE=2;
    var tmpl=S.template||'berlin';
    var cvHtml=(tmpl==='paris'?rParis():tmpl==='london'?rLondon():tmpl==='ats'?rAts():rBerlin());

    var host=document.createElement('div');
    host.style.cssText='position:fixed;top:0;left:0;z-index:-9999;width:'+A4_W+'px;overflow:hidden;pointer-events:none;background:#fff';
    host.innerHTML=cvHtml;
    document.body.appendChild(host);

    var hf=(S.headingFont||'Cormorant Garamond').replace(/"/g,"'");
    host.querySelectorAll('.cvn').forEach(function(e){e.style.fontFamily="'"+hf+"',serif,sans-serif";});

    var cv=host.firstElementChild;
    if(cv){
      cv.style.position='relative';
      var lsrc=(typeof LOGO_SRC!=='undefined'?LOGO_SRC:'')||(typeof _LSRC!=='undefined'?_LSRC:'');
      if(lsrc){var li=document.createElement('img');li.src=lsrc;li.alt='europin.org';li.style.cssText='position:absolute;top:6mm;right:6mm;width:26mm;height:auto;z-index:999;pointer-events:none;display:block';cv.appendChild(li);}
    }

    await(document.fonts&&document.fonts.ready?document.fonts.ready:Promise.resolve());
    await new Promise(function(r){setTimeout(r,400);});

    var canvas=await html2canvas(host,{
      scale:SCALE,useCORS:true,allowTaint:true,backgroundColor:'#ffffff',
      width:A4_W,height:host.scrollHeight||A4_H,
      windowWidth:A4_W,windowHeight:host.scrollHeight||A4_H,
      logging:false,imageTimeout:8000
    });
    document.body.removeChild(host);

    var{jsPDF}=window.jspdf;
    var pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4',compress:true});
    var canvasW=canvas.width,canvasH=canvas.height;
    var pageHeightPx=Math.round(A4_H*SCALE);
    var pagesCount=Math.ceil(canvasH/pageHeightPx),isFirst=true;

    for(var p=0;p<pagesCount;p++){
      if(!isFirst)pdf.addPage();isFirst=false;
      var srcY=p*pageHeightPx,srcH=Math.min(pageHeightPx,canvasH-srcY);
      var pc=document.createElement('canvas');pc.width=canvasW;pc.height=srcH;
      pc.getContext('2d').drawImage(canvas,0,srcY,canvasW,srcH,0,0,canvasW,srcH);
      var imgHmm=(srcH/canvasW)*210;
      pdf.addImage(pc.toDataURL('image/jpeg',0.97),'JPEG',0,0,210,imgHmm,undefined,'FAST');
    }
    pdf.save(fname||getFileName());
    restore();
  }catch(err){
    try{document.querySelectorAll('[style*="z-index:-9999"]').forEach(function(e){e.remove();});}catch(_){}
    restore();
    alert('PDF generation failed.\n'+err.message);
  }
}

let _cImg=null,_cX=0,_cY=0,_cZ=1,_cDrag=false,_cLX=0,_cLY=0;
function handlePhoto(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      _cImg=img;_cX=0;_cY=0;
      const longer=Math.max(img.naturalWidth,img.naturalHeight);
      _cZ=240/longer;
      const sl=document.getElementById('cropZoom');
      if(sl){sl.min=_cZ*.5;sl.max=_cZ*10;sl.step=(_cZ*9.5)/100;sl.value=_cZ;}
      document.getElementById('cropOverlay').classList.add('open');
      drawCrop();
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(f);
}
function drawCrop(){
  const cv=document.getElementById('cropCanvas');if(!cv||!_cImg)return;
  const ctx=cv.getContext('2d'),W=260;
  cv.width=W;cv.height=W;
  ctx.fillStyle='#0a1628';ctx.fillRect(0,0,W,W);
  const iw=_cImg.naturalWidth*_cZ,ih=_cImg.naturalHeight*_cZ;
  const dx=(W-iw)/2+_cX,dy=(W-ih)/2+_cY;
  ctx.save();ctx.beginPath();ctx.arc(W/2,W/2,W/2,0,Math.PI*2);ctx.clip();
  ctx.drawImage(_cImg,dx,dy,iw,ih);ctx.restore();
  ctx.beginPath();ctx.arc(W/2,W/2,W/2-1.5,0,Math.PI*2);
  ctx.strokeStyle='rgba(201,168,76,.8)';ctx.lineWidth=2.5;ctx.stroke();
}
function closeCropModal(){document.getElementById('cropOverlay').classList.remove('open');}
function confirmCrop(){
  if(!_cImg)return;
  const out=document.createElement('canvas');out.width=400;out.height=400;
  const ctx=out.getContext('2d'),R=400/260;
  ctx.beginPath();ctx.arc(200,200,200,0,Math.PI*2);ctx.clip();
  ctx.drawImage(_cImg,((260-_cImg.naturalWidth*_cZ)/2+_cX)*R,((260-_cImg.naturalHeight*_cZ)/2+_cY)*R,_cImg.naturalWidth*_cZ*R,_cImg.naturalHeight*_cZ*R);
  S.photo=out.toDataURL('image/jpeg',.92);_photo=S.photo;
  ['photoPreview'].forEach(id=>{const el=document.getElementById(id);if(el){el.src=S.photo;el.style.display='block';}});
  ['photoIcon'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  closeCropModal();
  if(typeof liveRender==='function')liveRender();
}

document.addEventListener('mousemove',e=>{if(!_cDrag)return;_cX+=e.clientX-_cLX;_cY+=e.clientY-_cLY;_cLX=e.clientX;_cLY=e.clientY;drawCrop();});
document.addEventListener('mouseup',()=>_cDrag=false);
document.addEventListener('touchstart',e=>{if(!e.target.closest('#cropWrap'))return;_cDrag=true;_cLX=e.touches[0].clientX;_cLY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchmove',e=>{if(!_cDrag)return;_cX+=e.touches[0].clientX-_cLX;_cY+=e.touches[0].clientY-_cLY;_cLX=e.touches[0].clientX;_cLY=e.touches[0].clientY;drawCrop();},{passive:true});

  function injectLogo(container){

    var cv = container && container.firstElementChild;
    if(!cv) return;
    if(!/cv-berlin|cv-paris|cv-london|cv-ats/.test(cv.className)) return;

    var old = cv.querySelector('.cv-brand-logo');
    if(old) old.parentNode.removeChild(old);
    /* Create and inject */
    var img = document.createElement('img');
    img.src = LOGO_SRC;
    img.alt = 'europin.org';
    img.className = 'cv-brand-logo';
    cv.appendChild(img);
  }

  /* Patch renderCV to always inject after render */
  if(typeof renderCV === 'function'){
    var _origRender = renderCV;
    window.renderCV = function(){
      _origRender.apply(this, arguments);
      var w1 = document.getElementById('cvWrap');
      var w2 = document.getElementById('cvWrap2');
      if(w1) injectLogo(w1);
      if(w2) injectLogo(w2);
    };
    renderCV = window.renderCV;
  }

  /* Patch downloadCV so PDF also has the logo */
  if(typeof downloadCV === 'function'){
    var _origDL = downloadCV;
    window.downloadCV = async function(btn){
      /* Wrap buildHTML to append logo tag so html2canvas captures it */
      var _origBuild = window.buildHTML;
      if(_origBuild){
        window.buildHTML = function(){
          var html = _origBuild();
          /* Append logo as last child inside the outer wrapper */
          var logoTag = '<img src="'+LOGO_SRC+'" alt="europin.org" style="position:absolute!important;top:6mm!important;right:6mm!important;width:26mm!important;height:auto!important;display:block!important;pointer-events:none!important;z-index:999!important;opacity:1!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;" />';
          /* Insert before the last </div> of the outer wrapper */
          return html.replace(/(<\/div>\s*)$/, logoTag + '$1');
        };
      }
      await _origDL.apply(this, arguments);
      /* Restore */
      if(_origBuild) window.buildHTML = _origBuild;
    };
    downloadCV = window.downloadCV;
  }

  /* Run once on page load to cover any initial render */
  window.addEventListener('DOMContentLoaded', function(){
    setTimeout(function(){
      var w1 = document.getElementById('cvWrap');
      var w2 = document.getElementById('cvWrap2');
      if(w1 && w1.firstElementChild) injectLogo(w1);
      if(w2 && w2.firstElementChild) injectLogo(w2);
    }, 400);
  });
})();



</script>
</body>
